apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

namePrefix: stg-

commonLabels:
  environment: staging
  managed-by: kustomize

commonAnnotations:
  environment: staging
  updated-at: "2026-03-12"

bases:
  - ../../base/user-service

replicas:
  - name: user-service
    count: 2

patches:
  - target:
      kind: Deployment
      name: user-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nextgen-telco/user-service:staging
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: replace
        path: /spec/template/spec/containers/0/env/3/valueFrom/secretKeyRef/name
        value: stg-user-service-secret
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: INFO
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m

configMapGenerator:
  - name: user-service-config
    literals:
      - environment=staging
      - log_level=INFO
      - database_pool_size=10
      - cache_enabled=true

secretGenerator:
  - name: user-service-secret
    literals:
      - database_url=postgresql://postgres:password@postgres-staging.staging:5432/user_db_stg

images:
  - name: nextgen-telco/user-service
    newTag: staging
