apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: user-service
        image: nextgen-telco/user-service:staging
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_ENV
          value: staging
        - name: LOG_LEVEL
          value: info
        resources:
          requests:
            memory: "128Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "1000m"
