apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: testing

namePrefix: test-

commonLabels:
  environment: test
  managed-by: kustomize

commonAnnotations:
  environment: testing
  updated-at: "2026-03-12"

bases:
  - ../../base/order-service

replicas:
  - name: order-service
    count: 1

patches:
  - target:
      kind: Deployment
      name: order-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nextgen-telco/order-service:test
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: replace
        path: /spec/template/spec/containers/0/env/3/valueFrom/secretKeyRef/name
        value: test-order-service-secret
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: kafka.testing:9092
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: INFO
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m

configMapGenerator:
  - name: order-service-config
    literals:
      - environment=testing
      - log_level=INFO
      - database_pool_size=5
      - kafka_brokers=kafka.testing:9092

secretGenerator:
  - name: order-service-secret
    literals:
      - database_url=postgresql://postgres:password@postgres.testing:5432/order_db_test

images:
  - name: nextgen-telco/order-service
    newTag: test
