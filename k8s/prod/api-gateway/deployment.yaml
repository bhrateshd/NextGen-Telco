---
# API Gateway - Production Environment Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-api-gateway
  namespace: production
  labels:
    app: api-gateway
    env: prod
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - api-gateway
              topologyKey: kubernetes.io/hostname
      containers:
      - name: api-gateway
        image: nextgen-telco/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: production
        - name: LOG_LEVEL
          value: warn
        - name: USER_SERVICE_URL
          value: http://user-service:8080
        - name: PLAN_SERVICE_URL
          value: http://plan-service:8080
        - name: DEVICE_SERVICE_URL
          value: http://device-service:8080
        - name: ORDER_SERVICE_URL
          value: http://order-service:8080
        - name: PAYMENT_SERVICE_URL
          value: http://payment-service:8080
        - name: RATE_LIMIT_MAX
          value: "1000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: production
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: api-gateway
