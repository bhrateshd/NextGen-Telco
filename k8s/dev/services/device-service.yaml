apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-service
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: device-service
        image: nextgen-telco/device-service:dev
        imagePullPolicy: Always
        env:
        - name: NODE_ENV
          value: development
        - name: LOG_LEVEL
          value: debug
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
