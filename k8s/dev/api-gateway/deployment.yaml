---
# API Gateway - Development Environment Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-api-gateway
  namespace: development
  labels:
    app: api-gateway
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nextgen-telco/api-gateway:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: development
        - name: LOG_LEVEL
          value: debug
        - name: USER_SERVICE_URL
          value: http://user-service:8080
        - name: PLAN_SERVICE_URL
          value: http://plan-service:8080
        - name: DEVICE_SERVICE_URL
          value: http://device-service:8080
        - name: ORDER_SERVICE_URL
          value: http://order-service:8080
        - name: PAYMENT_SERVICE_URL
          value: http://payment-service:8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: development
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: api-gateway
