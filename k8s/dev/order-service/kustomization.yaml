apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

namePrefix: dev-

commonLabels:
  environment: dev
  managed-by: kustomize

commonAnnotations:
  environment: development
  updated-at: "2026-03-12"

bases:
  - ../../base/order-service

replicas:
  - name: order-service
    count: 1

patches:
  - target:
      kind: Deployment
      name: order-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nextgen-telco/order-service:dev
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
      - op: replace
        path: /spec/template/spec/containers/0/env/3/valueFrom/secretKeyRef/name
        value: dev-order-service-secret
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: kafka.development:9092
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: DEBUG
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m

configMapGenerator:
  - name: order-service-config
    literals:
      - environment=development
      - log_level=DEBUG
      - database_pool_size=5
      - kafka_brokers=kafka.development:9092

secretGenerator:
  - name: order-service-secret
    literals:
      - database_url=postgresql://postgres:password@postgres.development:5432/order_db_dev

images:
  - name: nextgen-telco/order-service
    newTag: dev
