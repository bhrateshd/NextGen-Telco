version: '3.8'

services:
  # ==================== MICROSERVICES ====================

  auth-service:
    image: nextgen-telco/auth-service:latest
    container_name: nextgen-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nextgen-network
    restart: unless-stopped

  user-service:
    image: nextgen-telco/user-service:latest
    container_name: nextgen-user-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nextgen-network
    restart: unless-stopped

  plan-service:
    image: nextgen-telco/plan-service:latest
    container_name: nextgen-plan-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nextgen-network
    restart: unless-stopped

  device-service:
    image: nextgen-telco/device-service:latest
    container_name: nextgen-device-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nextgen-network
    restart: unless-stopped

  order-service:
    image: nextgen-telco/order-service:latest
    container_name: nextgen-order-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nextgen-network
    restart: unless-stopped

  payment-service:
    image: nextgen-telco/payment-service:latest
    container_name: nextgen-payment-service
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nextgen-network
    restart: unless-stopped

  # ==================== API GATEWAY ====================

  api-gateway:
    image: nextgen-telco/api-gateway:latest
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: nextgen-api-gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=info
      - USER_SERVICE_URL=http://user-service:3002
      - PLAN_SERVICE_URL=http://plan-service:3003
      - DEVICE_SERVICE_URL=http://device-service:3004
      - ORDER_SERVICE_URL=http://order-service:3005
      - PAYMENT_SERVICE_URL=http://payment-service:3006
      - AUTH_SERVICE_URL=http://auth-service:3001
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:8080,http://localhost:3000
      - RATE_LIMIT_MAX=1000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - auth-service
      - user-service
      - plan-service
      - device-service
      - order-service
      - payment-service
    networks:
      - nextgen-network
    restart: unless-stopped

  # ==================== FRONTEND ====================

  frontend:
    image: nextgen-telco/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextgen-frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - API_GATEWAY_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - nextgen-network
    restart: unless-stopped

networks:
  nextgen-network:
    driver: bridge
