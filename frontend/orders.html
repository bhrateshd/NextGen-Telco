<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Telco - Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="index.html" class="logo">NextGen Telco</a>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1>Complete Your Order</h1>

            <div class="checkout-content">
                <div class="checkout-form">
                    <form id="checkout-form">
                        <!-- Billing Information -->
                        <div class="form-section">
                            <h2>Billing Information</h2>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="bill-first">First Name</label>
                                    <input type="text" id="bill-first" required>
                                </div>
                                <div class="form-group">
                                    <label for="bill-last">Last Name</label>
                                    <input type="text" id="bill-last" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="bill-email">Email</label>
                                <input type="email" id="bill-email" required>
                            </div>

                            <div class="form-group">
                                <label for="bill-phone">Phone</label>
                                <input type="tel" id="bill-phone" required>
                            </div>

                            <div class="form-group">
                                <label for="bill-address">Street Address</label>
                                <input type="text" id="bill-address" required>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="bill-city">City</label>
                                    <input type="text" id="bill-city" required>
                                </div>
                                <div class="form-group">
                                    <label for="bill-state">State</label>
                                    <input type="text" id="bill-state" required>
                                </div>
                                <div class="form-group">
                                    <label for="bill-zip">ZIP Code</label>
                                    <input type="text" id="bill-zip" required>
                                </div>
                            </div>
                        </div>

                        <!-- Payment Method -->
                        <div class="form-section">
                            <h2>Payment Method</h2>
                            <div class="payment-options">
                                <label>
                                    <input type="radio" name="payment" value="credit" checked>
                                    Credit/Debit Card
                                </label>
                                <label>
                                    <input type="radio" name="payment" value="paypal">
                                    PayPal
                                </label>
                            </div>

                            <div class="form-group">
                                <label for="card-name">Name on Card</label>
                                <input type="text" id="card-name" required>
                            </div>

                            <div class="form-group">
                                <label for="card-number">Card Number</label>
                                <input type="text" id="card-number" placeholder="1234 5678 9012 3456" required>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="card-expiry">Expiry Date</label>
                                    <input type="text" id="card-expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="form-group">
                                    <label for="card-cvv">CVV</label>
                                    <input type="text" id="card-cvv" placeholder="123" required>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary btn-block">Complete Purchase</button>
                    </form>
                </div>

                <div class="order-summary-checkout">
                    <h2>Order Summary</h2>
                    <div class="summary-item">
                        <span>Unlimited Plus Plan</span>
                        <span>$65.00</span>
                    </div>
                    <div class="summary-item">
                        <span>iPhone 15</span>
                        <span>$749.00</span>
                    </div>
                    <hr>
                    <div class="summary-item">
                        <span>Subtotal:</span>
                        <span>$814.00</span>
                    </div>
                    <div class="summary-item">
                        <span>Shipping:</span>
                        <span>Free</span>
                    </div>
                    <div class="summary-item">
                        <span>Tax:</span>
                        <span>$65.12</span>
                    </div>
                    <div class="summary-item total">
                        <span>Total:</span>
                        <span>$879.12</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 NextGen Telco. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
