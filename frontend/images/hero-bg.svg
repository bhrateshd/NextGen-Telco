<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Hero Background Pattern -->
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0052a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d7a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="600" fill="url(#heroBg)"/>
  
  <!-- Accent overlay -->
  <rect width="1200" height="600" fill="url(#accent)"/>
  
  <!-- Geometric shapes -->
  <circle cx="100" cy="100" r="80" fill="#ffffff" opacity="0.05"/>
  <circle cx="1100" cy="500" r="120" fill="#ffffff" opacity="0.08"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="600"/>
    <line x1="1200" y1="0" x2="0" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>
  
  <!-- 5G nodes visualization -->
  <circle cx="200" cy="150" r="4" fill="#ff6600" opacity="0.6"/>
  <circle cx="400" cy="200" r="4" fill="#ff6600" opacity="0.6"/>
  <circle cx="800" cy="100" r="4" fill="#ff6600" opacity="0.6"/>
  <circle cx="1000" cy="250" r="4" fill="#ff6600" opacity="0.6"/>
  
  <!-- Connecting lines -->
  <line x1="200" y1="150" x2="400" y2="200" stroke="#ff6600" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="200" x2="800" y2="100" stroke="#ff6600" stroke-width="1" opacity="0.3"/>
  <line x1="800" y1="100" x2="1000" y2="250" stroke="#ff6600" stroke-width="1" opacity="0.3"/>
  
  <!-- Wave effects -->
  <path d="M 0,400 Q 300,350 600,400 T 1200,400" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.1"/>
  <path d="M 0,450 Q 300,400 600,450 T 1200,450" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.08"/>
  
  <!-- Glow orb -->
  <circle cx="150" cy="450" r="50" fill="#ff6600" opacity="0.1"/>
  <circle cx="150" cy="450" r="35" fill="#ff6600" opacity="0.15"/>
</svg>