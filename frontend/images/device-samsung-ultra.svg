<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 280">
  <defs>
    <!-- Samsung S24 Ultra Titanium -->
    <linearGradient id="ultraBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1f1f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ultraDisplayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadowUltra" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Drop shadow -->
  <g filter="url(#shadowUltra)">
    <!-- Phone body with titanium frame -->
    <rect x="15" y="15" width="110" height="250" rx="28" fill="url(#ultraBody)" stroke="#666" stroke-width="2"/>
    
    <!-- Large camera housing -->
    <rect x="82" y="20" width="40" height="40" rx="14" fill="#0a0a0a" stroke="#555" stroke-width="2"/>
    
    <!-- Quad camera setup -->
    <circle cx="94" cy="32" r="7" fill="#000" stroke="#666" stroke-width="1.5"/>
    <circle cx="94" cy="32" r="4" fill="#111"/>
    
    <circle cx="108" cy="32" r="7" fill="#000" stroke="#666" stroke-width="1.5"/>
    <circle cx="108" cy="32" r="4" fill="#111"/>
    
    <circle cx="94" cy="48" r="6" fill="#000" stroke="#666" stroke-width="1.5"/>
    <circle cx="94" cy="48" r="3" fill="#111"/>
    
    <circle cx="108" cy="48" r="6" fill="#000" stroke="#666" stroke-width="1.5"/>
    <circle cx="108" cy="48" r="3" fill="#111"/>
    
    <!-- Display -->
    <rect x="20" y="50" width="100" height="210" rx="20" fill="url(#ultraDisplayGradient)" stroke="#333" stroke-width="1.5"/>
    
    <!-- Screen content - Ultra features -->
    <rect x="24" y="56" width="92" height="198" rx="16" fill="#0a1428"/>
    
    <!-- Premium S-Pen feature indicator -->
    <rect x="115" y="120" width="4" height="40" rx="2" fill="#888" stroke="#666" stroke-width="0.5"/>
    
    <!-- Status bar -->
    <g opacity="0.8">
      <text x="28" y="70" font-family="Arial, sans-serif" font-size="7" fill="#fff" font-weight="600">9:41</text>
      <circle cx="110" cy="66" r="1.5" fill="#fff"/>
      <circle cx="116" cy="66" r="1.5" fill="#fff"/>
    </g>
    
    <!-- Ultra display showcase -->
    <rect x="28" y="85" width="14" height="14" rx="3" fill="#0066cc" opacity="0.95"/>
    <rect x="48" y="85" width="14" height="14" rx="3" fill="#ff6600" opacity="0.95"/>
    <rect x="68" y="85" width="14" height="14" rx="3" fill="#28a745" opacity="0.95"/>
    <rect x="88" y="85" width="14" height="14" rx="3" fill="#e74c3c" opacity="0.95"/>
    
    <!-- Ultra features content -->
    <rect x="28" y="110" width="84" height="8" rx="2" fill="#00bcd4" opacity="0.25"/>
    <rect x="28" y="125" width="84" height="8" rx="2" fill="#00bcd4" opacity="0.2"/>
    <rect x="28" y="140" width="84" height="45" rx="4" fill="#1e90ff" opacity="0.15"/>
    
    <!-- S-Pen indicator -->
    <text x="28" y="200" font-family="Arial, sans-serif" font-size="5" fill="#00bcd4" opacity="0.8">S-PEN READY</text>
    
    <!-- Bottom gesture area -->
    <rect x="58" y="248" width="24" height="2.5" rx="1.5" fill="#777" opacity="0.7"/>
    
    <!-- Ultra shine effect -->
    <ellipse cx="50" cy="130" rx="22" ry="50" fill="white" opacity="0.06"/>
  </g>
  
  <!-- Model name -->
  <text x="70" y="275" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Galaxy S24 Ultra</text>
</svg>