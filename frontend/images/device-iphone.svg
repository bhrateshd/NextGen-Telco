<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 280">
  <defs>
    <!-- iPhone 15 Black gradient -->
    <linearGradient id="iphoneBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="displayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Drop shadow -->
  <g filter="url(#shadow)">
    <!-- Phone body frame -->
    <rect x="15" y="15" width="110" height="250" rx="24" fill="url(#iphoneBody)" stroke="#333" stroke-width="1.5"/>
    
    <!-- Rear camera -->
    <rect x="95" y="25" width="18" height="18" rx="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <circle cx="104" cy="34" r="6" fill="#000" stroke="#666" stroke-width="1"/>
    
    <!-- Display area -->
    <rect x="20" y="50" width="100" height="210" rx="18" fill="url(#displayGradient)" stroke="#222" stroke-width="1"/>
    
    <!-- Dynamic Island notch -->
    <rect x="58" y="53" width="24" height="14" rx="7" fill="#000" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Screen content - Apple-like UI -->
    <rect x="24" y="72" width="92" height="180" rx="14" fill="#e8eaed"/>
    
    <!-- Status bar icons -->
    <text x="30" y="82" font-family="Arial, sans-serif" font-size="8" fill="#333">9:41</text>
    <circle cx="108" cy="79" r="2" fill="#333"/>
    <circle cx="115" cy="79" r="2" fill="#333"/>
    
    <!-- App grid preview -->
    <rect x="28" y="90" width="16" height="16" rx="3" fill="#0066cc" opacity="0.8"/>
    <rect x="50" y="90" width="16" height="16" rx="3" fill="#ff6600" opacity="0.8"/>
    <rect x="72" y="90" width="16" height="16" rx="3" fill="#28a745" opacity="0.8"/>
    
    <rect x="28" y="115" width="16" height="16" rx="3" fill="#dc3545" opacity="0.8"/>
    <rect x="50" y="115" width="16" height="16" rx="3" fill="#ffc107" opacity="0.8"/>
    <rect x="72" y="115" width="16" height="16" rx="3" fill="#17a2b8" opacity="0.8"/>
    
    <!-- Home indicator -->
    <rect x="58" y="238" width="24" height="3" rx="2" fill="#555" opacity="0.5"/>
    
    <!-- Screen shine/reflection -->
    <ellipse cx="40" cy="100" rx="15" ry="35" fill="white" opacity="0.08"/>
  </g>
  
  <!-- Model name -->
  <text x="70" y="275" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#333" text-anchor="middle">iPhone 15</text>
</svg>