<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <!-- Logo background -->
  <rect width="200" height="80" fill="none"/>
  
  <!-- 5G Network Icon -->
  <g transform="translate(20, 10)">
    <!-- Signal bars -->
    <rect x="5" y="40" width="4" height="8" fill="#0066cc"/>
    <rect x="12" y="32" width="4" height="16" fill="#0066cc"/>
    <rect x="19" y="24" width="4" height="24" fill="#0066cc"/>
    <rect x="26" y="16" width="4" height="32" fill="#0066cc"/>
    
    <!-- 5G text -->
    <text x="38" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0066cc">5G</text>
  </g>
  
  <!-- Company Name -->
  <text x="100" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0066cc" text-anchor="middle">NextGen</text>
  <text x="100" y="58" font-family="Arial, sans-serif" font-size="16" fill="#ff6600" text-anchor="middle">TELCO</text>
</svg>