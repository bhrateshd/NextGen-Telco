<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 280">
  <defs>
    <!-- Pixel 8 Pro Obsidian -->
    <linearGradient id="pixelProBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="proDisplayGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadowPixelPro" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Drop shadow -->
  <g filter="url(#shadowPixelPro)">
    <!-- Phone body -->
    <rect x="15" y="15" width="110" height="250" rx="22" fill="url(#pixelProBody)" stroke="#444" stroke-width="1.5"/>
    
    <!-- Large camera bar for Pro -->
    <rect x="18" y="20" width="104" height="56" rx="14" fill="#0a0a0a" stroke="#333" stroke-width="1.5"/>
    
    <!-- Pro camera setup - 4 cameras -->
    <circle cx="42" cy="40" r="11" fill="#0a0a0a" stroke="#555" stroke-width="1.5"/>
    <circle cx="42" cy="40" r="8" fill="#000"/>
    <circle cx="40" cy="38" r="2" fill="#333" opacity="0.5"/>
    
    <circle cx="68" cy="40" r="11" fill="#0a0a0a" stroke="#555" stroke-width="1.5"/>
    <circle cx="68" cy="40" r="8" fill="#000"/>
    
    <circle cx="94" cy="40" r="10" fill="#0a0a0a" stroke="#555" stroke-width="1.5"/>
    <circle cx="94" cy="40" r="7" fill="#000"/>
    
    <!-- Tele lens -->
    <circle cx="120" cy="50" r="6" fill="#0a0a0a" stroke="#555" stroke-width="1"/>
    <circle cx="120" cy="50" r="3.5" fill="#000"/>
    
    <!-- Flash -->
    <circle cx="50" cy="62" r="4" fill="#222" stroke="#555" stroke-width="0.5"/>
    
    <!-- Sensor -->
    <circle cx="100" cy="65" r="3" fill="#333"/>
    
    <!-- Display -->
    <rect x="20" y="85" width="100" height="180" rx="18" fill="url(#proDisplayGradient3)" stroke="#333" stroke-width="1.5"/>
    
    <!-- Screen content - Premium Pro UI -->
    <rect x="24" y="91" width="92" height="168" rx="14" fill="#0a0a14"/>
    
    <!-- Status bar Pro -->
    <g opacity="0.9">
      <text x="28" y="105" font-family="Arial, sans-serif" font-size="7" fill="#fff" font-weight="600">9:41</text>
      <circle cx="110" cy="101" r="1.5" fill="#fff"/>
      <circle cx="116" cy="101" r="1.5" fill="#fff"/>
    </g>
    
    <!-- Pro features -->
    <rect x="28" y="120" width="13" height="13" rx="2" fill="#ea4335" opacity="0.95"/>
    <rect x="48" y="120" width="13" height="13" rx="2" fill="#4285f4" opacity="0.95"/>
    <rect x="68" y="120" width="13" height="13" rx="2" fill="#fbbc05" opacity="0.95"/>
    <rect x="88" y="120" width="13" height="13" rx="2" fill="#34a853" opacity="0.95"/>
    
    <!-- Pro content areas -->
    <rect x="28" y="145" width="84" height="6" rx="2" fill="#ff6b9d" opacity="0.25"/>
    <rect x="28" y="157" width="84" height="6" rx="2" fill="#ff6b9d" opacity="0.2"/>
    <rect x="28" y="170" width="84" height="40" rx="4" fill="#c06c84" opacity="0.15"/>
    
    <!-- Pro indicator text -->
    <text x="28" y="220" font-family="Arial, sans-serif" font-size="6" fill="#888" opacity="0.8">ADVANCED AI</text>
    
    <!-- Bottom gesture area -->
    <rect x="58" y="249" width="24" height="2" rx="1" fill="#666" opacity="0.6"/>
    
    <!-- Premium shine -->
    <ellipse cx="50" cy="140" rx="20" ry="45" fill="white" opacity="0.06"/>
  </g>
  
  <!-- Model name -->
  <text x="70" y="275" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#666" text-anchor="middle">Pixel 8 Pro</text>
</svg>