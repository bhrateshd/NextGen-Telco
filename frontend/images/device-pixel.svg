<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 280">
  <defs>
    <!-- Pixel 8 Obsidian black -->
    <linearGradient id="pixelBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1f1f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="displayGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Drop shadow -->
  <g filter="url(#shadow3)">
    <!-- Phone body -->
    <rect x="15" y="15" width="110" height="250" rx="22" fill="url(#pixelBody)" stroke="#333" stroke-width="1.5"/>
    
    <!-- Camera bar background -->
    <rect x="20" y="25" width="100" height="50" rx="12" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
    
    <!-- Main camera (larger) -->
    <circle cx="48" cy="50" r="11" fill="#0a0a0a" stroke="#444" stroke-width="1.5"/>
    <circle cx="48" cy="50" r="8" fill="#000"/>
    <circle cx="46" cy="48" r="2" fill="#333" opacity="0.5"/>
    
    <!-- Secondary camera -->
    <circle cx="78" cy="50" r="10" fill="#0a0a0a" stroke="#444" stroke-width="1.5"/>
    <circle cx="78" cy="50" r="7" fill="#000"/>
    
    <!-- Flash -->
    <circle cx="108" cy="34" r="4" fill="#222" stroke="#444" stroke-width="0.5"/>
    
    <!-- Sensor -->
    <circle cx="105" cy="54" r="3" fill="#333"/>
    
    <!-- Display -->
    <rect x="20" y="85" width="100" height="180" rx="18" fill="url(#displayGradient3)" stroke="#222" stroke-width="1"/>
    
    <!-- Screen content -->
    <rect x="24" y="91" width="92" height="168" rx="14" fill="#1a1a2e"/>
    
    <!-- Status bar -->
    <g opacity="0.8">
      <text x="28" y="105" font-family="Arial, sans-serif" font-size="7" fill="#fff">9:41</text>
      <circle cx="110" cy="101" r="1.5" fill="#fff"/>
      <circle cx="116" cy="101" r="1.5" fill="#fff"/>
    </g>
    
    <!-- Google Material Design grid -->
    <rect x="28" y="120" width="13" height="13" rx="2" fill="#ea4335"/>
    <rect x="48" y="120" width="13" height="13" rx="2" fill="#4285f4"/>
    <rect x="68" y="120" width="13" height="13" rx="2" fill="#fbbc05"/>
    <rect x="88" y="120" width="13" height="13" rx="2" fill="#34a853"/>
    
    <!-- More UI cards -->
    <rect x="28" y="145" width="84" height="35" rx="4" fill="#40c4ff" opacity="0.3"/>
    <rect x="28" y="190" width="84" height="30" rx="4" fill="#6200ea" opacity="0.2"/>
    
    <!-- Bottom gestures area -->
    <rect x="58" y="249" width="24" height="2" rx="1" fill="#555" opacity="0.5"/>
    
    <!-- Screen shine/reflection -->
    <ellipse cx="50" cy="140" rx="20" ry="45" fill="white" opacity="0.05"/>
  </g>
  
  <!-- Model name -->
  <text x="70" y="275" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Pixel 8</text>
</svg>