<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 240">
  <!-- Google Pixel 8 -->
  <defs>
    <linearGradient id="pixelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Phone body -->
  <rect x="10" y="10" width="100" height="220" rx="18" fill="url(#pixelGradient)" stroke="#555" stroke-width="2"/>
  
  <!-- Camera bar -->
  <rect x="12" y="15" width="96" height="50" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  
  <!-- Main camera -->
  <circle cx="40" cy="40" r="10" fill="#000" stroke="#555" stroke-width="2"/>
  <circle cx="40" cy="40" r="7" fill="#333"/>
  
  <!-- Second camera -->
  <circle cx="70" cy="40" r="10" fill="#000" stroke="#555" stroke-width="2"/>
  <circle cx="70" cy="40" r="7" fill="#333"/>
  
  <!-- Sensor -->
  <circle cx="95" cy="32" r="4" fill="#444"/>
  
  <!-- Screen -->
  <rect x="14" y="70" width="92" height="150" rx="12" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  
  <!-- Display content -->
  <rect x="18" y="75" width="84" height="140" rx="8" fill="#1a4d1a"/>
  
  <!-- Google color accents -->
  <circle cx="30" cy="95" r="6" fill="#ea4335"/>
  <circle cx="45" cy="95" r="6" fill="#4285f4"/>
  <circle cx="60" cy="95" r="6" fill="#fbbc05"/>
  <circle cx="75" cy="95" r="6" fill="#34a853"/>
  
  <!-- Content blocks -->
  <rect x="20" y="115" width="80" height="30" rx="4" fill="#ffffff" opacity="0.1"/>
  <rect x="20" y="155" width="80" height="30" rx="4" fill="#ffffff" opacity="0.1"/>
  
  <!-- Text -->
  <text x="60" y="232" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#888" text-anchor="middle">Pixel 8</text>
</svg>